$schema: "https://github.com/mageoch/silicai/schema/component.schema.json"
$schema_version: "0.1.0"

component:
  mpn: PSM712
  manufacturer: ProTek Devices
  category: discrete
  package: SOT-23
  datasheet: "https://www.protekdevices.com/Assets/Documents/Technical/05094.pdf"

  description: >
    600W peak pulse power asymmetrical TVS array designed for RS-485 data line
    protection. Provides two channels (pins 1 and 2) to a shared ground reference
    (pin 3). Clamps ESD up to 15kV air / 8kV contact per IEC 61000-4-2.
    Compatible with IEC 61000-4-4 (EFT, 40A) and IEC 61000-4-5 (surge, 8/20µs).

  temperature_range:
    operating:
      min: { value: -55, unit: "°C" }
      max: { value: 150, unit: "°C" }
    storage:
      min: { value: -55, unit: "°C" }
      max: { value: 150, unit: "°C" }

  absolute_maximum_ratings:
    - parameter: peak_pulse_power
      pins: []
      unit: W
      max: 600
      conditions: "tp = 8/20µs waveform"
    - parameter: stand_off_voltage_pin3_to_pin1_2
      pins: ["1", "2", "3"]
      unit: V
      max: 7.0
      conditions: "Pin 3 positive; rated stand-off voltage per line"
    - parameter: stand_off_voltage_pin1_2_to_pin3
      pins: ["1", "2", "3"]
      unit: V
      max: 12.0
      conditions: "Pins 1/2 positive; rated stand-off voltage per line"
    - parameter: peak_surge_current
      pins: ["1", "2", "3"]
      unit: A
      max: 34
      conditions: "8/20µs, pin 3-1 & 3-2 direction"
    - parameter: operating_temperature
      pins: []
      unit: "°C"
      min: -55
      max: 150
    - parameter: storage_temperature
      pins: []
      unit: "°C"
      min: -55
      max: 150

  esd_ratings:
    - standard: IEC_61000-4-2
      contact_discharge: { value: 8, unit: kV }
      air_gap_discharge: { value: 15, unit: kV }
    - standard: IEC_61000-4-4
      peak_current: { value: 40, unit: A }
      conditions: "5/50ns"
    - standard: IEC_61000-4-5
      peak_current: { value: 24, unit: A }
      conditions: "8/20µs, Level 2 Line-Ground / Level 3 Line-Line"

  pins:
    - number: 1
      name: LINE1
      direction: passive
      description: "RS-485 data line 1. Protected against transients via internal TVS to pin 3."

    - number: 2
      name: LINE2
      direction: passive
      description: "RS-485 data line 2. Protected against transients via internal TVS to pin 3."

    - number: 3
      name: GND
      direction: passive
      description: >
        Ground / common reference. For 7V protection, pin 3 is the positive
        rail; for 12V protection, pins 1/2 are positive. Connect to circuit ground.
