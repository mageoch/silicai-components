$schema: "https://raw.githubusercontent.com/mageoch/silicai/main/src/silicai/schema/component.schema.json"
$schema_version: "0.1.0"

component:
  mpn: CM4001000
  manufacturer: Raspberry Pi Ltd
  category: mpu
  package: SOM-100pin-x2
  datasheet: "https://datasheets.raspberrypi.com/cm4/cm4-datasheet.pdf"
  description: >
    Raspberry Pi Compute Module 4 (CM4). System-on-Module containing the
    Broadcom BCM2711 quad-core Cortex-A72 (ARM v8) 64-bit SoC at 1.5 GHz,
    1 GB LPDDR4-3200 SDRAM, no on-board eMMC (Lite variant), and no wireless.
    Interfaces via two 100-pin high-density board-to-board connectors
    (Hirose DF40C-100DS-0.4V or compatible). 55 mm x 40 mm x 4.7 mm module.

  remark: "Ordering code: CM4<wireless><RAM><storage>. wireless: 0=No, 1=Yes. RAM: 01=1GB 02=2GB 04=4GB 08=8GB. storage: 000=Lite(0GB) 008=8GB 016=16GB 032=32GB. CM4001000 = no wireless, 1 GB RAM, Lite (no eMMC)."

  absolute_maximum_ratings:
    - parameter: supply_voltage_5v
      pins: ["+5V_77", "+5V_79", "+5V_81", "+5V_83", "+5V_85", "+5V_87"]
      unit: V
      min: -0.5
      max: 6.0
    - parameter: gpio_bank_voltage_vref
      pins: [GPIO_VREF]
      unit: V
      min: -0.5
      max: 3.6
    - parameter: gpio_input_voltage
      pins: []
      unit: V
      min: -0.5
      max: 3.6
      remark: "V_GPIO_VREF + 0.5 V; worst-case at V_GPIO_VREF = 3.1 V"

  recommended_operating_conditions:
    - parameter: supply_voltage_5v
      pins: ["+5V_77", "+5V_79", "+5V_81", "+5V_83", "+5V_85", "+5V_87"]
      unit: V
      min: 4.75
      nom: 5.0
      max: 5.25
    - parameter: cm4_3v3_output
      pins: [CM4_3V3_84, CM4_3V3_86]
      unit: V
      nom: 3.3
      description: "On-module 3.3 V regulator output; max 300 mA per pin, 600 mA total"
    - parameter: cm4_1v8_output
      pins: [CM4_1V8_88, CM4_1V8_90]
      unit: V
      nom: 1.8
      description: "On-module 1.8 V regulator output; max 300 mA per pin, 600 mA total"

  temperature_range:
    operating:
      min: { value: -20, unit: "°C" }
      max: { value: 85, unit: "°C" }

  power_consumption:
    - mode: shutdown
      description: "GLOBAL_EN = 0 V (lowest power-down state)"
      rail: vdd_5v
      current: { value: 15, unit: µA }
    - mode: soft_off
      description: "GLOBAL_EN > 2 V, software shutdown"
      rail: vdd_5v
      current: { value: 8, unit: mA }
    - mode: idle
      description: "GLOBAL_EN > 2 V, OS idle"
      rail: vdd_5v
      current: { value: 400, unit: mA }
    - mode: operating
      description: "GLOBAL_EN > 2 V, typical load"
      rail: vdd_5v
      current: { value: 1400, unit: mA }

  rails:
    - id: vdd_5v
      net: "+5V"
      description: "Main 5 V supply input. Multiple pins must all be connected."
      per_pin_decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close
    - id: vdd_3v3
      net: CM4_3V3
      description: "On-module 3.3 V regulated output; max 600 mA total across both pins"
    - id: vdd_1v8
      net: CM4_1V8
      description: "On-module 1.8 V regulated output; max 600 mA total across both pins"

