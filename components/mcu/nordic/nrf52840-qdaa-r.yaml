$schema: "https://mageoch.github.io/silicai/schema/component.schema.json"
$schema_version: "0.1.0"

component:
  mpn: nRF52840-QDAA-R
  manufacturer: Nordic Semiconductor
  category: mcu
  package: WLCSP-94
  datasheet: "https://infocenter.nordicsemi.com/pdf/nRF52840_PS_v1.7.pdf"
  kicad_symbol: "MCU_Nordic:nRF52840"

  absolute_maximum_ratings:
    - parameter: vdd_voltage
      pins: [VDD]
      unit: V
      max: 3.9
    - parameter: vddh_voltage
      pins: [VDDH]
      unit: V
      max: 5.8
    - parameter: vbus_voltage
      pins: [VBUS]
      unit: V
      max: 5.8
    - parameter: gpio_voltage
      pins: [AIN0, AIN1, AIN2, AIN3, AIN4, AIN5, AIN6, AIN7, P0.06, P0.07, P0.08]
      unit: V
      max: 3.6
      remark: "Assumes VDDH = VDD; rises to 5.5V when VDDH > 3.6V"

  recommended_operating_conditions:
    - parameter: vdd_voltage
      pins: [VDD]
      unit: V
      min: 1.7
      nom: 3.3
      max: 3.6
    - parameter: vddh_voltage
      pins: [VDDH]
      unit: V
      min: 2.5
      nom: 3.3
      max: 5.5
    - parameter: vbus_voltage
      pins: [VBUS]
      unit: V
      min: 4.35
      nom: 5.0
      max: 5.5

  temperature_range:
    operating:
      min: { value: -40, unit: °C }
      max: { value: 85, unit: °C }
    storage:
      min: { value: -40, unit: °C }
      max: { value: 150, unit: °C }
    junction_max:       { value: 85, unit: °C }
    thermal_resistance_ja: { value: 30, unit: °C/W }

  power_consumption:
    - mode: active_ble_tx
      description: "Bluetooth 5 TX at 0 dBm, 64 MHz CPU, all RAM on"
      rail: vdd
      current: { value: 7.5, unit: mA }
      conditions: "VDD=3.0V, 64 MHz, BLE TX 0 dBm"
    - mode: active_ble_rx
      description: "Bluetooth 5 RX, 64 MHz CPU, all RAM on"
      rail: vdd
      current: { value: 7.3, unit: mA }
      conditions: "VDD=3.0V, 64 MHz, BLE RX"
    - mode: active_cpu
      description: "CPU running at 64 MHz, no radio, all peripherals off"
      rail: vdd
      current: { value: 3.2, unit: mA }
      conditions: "VDD=3.0V, 64 MHz, CoreMark benchmark"
    - mode: sleep_ram_retention
      description: "System ON sleep, CPU halted, RAM retained, RTC running"
      rail: vdd
      current: { value: 3.8, unit: µA }
      conditions: "VDD=3.0V, 256 kB RAM retained, 32kHz RTC"
    - mode: system_off
      description: "Lowest power state; RAM lost, wakeup via GPIO or reset"
      rail: vdd
      current: { value: 0.5, unit: µA }
      conditions: "VDD=3.0V, no RAM retained"

  rails:
    - id: vdd
      net: VDD
    - id: vddh
      net: VDDH
    - id: vbus
      net: VBUS

  pins:
    - number: B1
      name: VDD
      direction: power_in
      rail: vdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: A22
      name: VDD
      direction: passive
      rail: vdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: AD14
      name: VDD
      direction: passive
      rail: vdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: AD23
      name: VDD
      direction: passive
      rail: vdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: W1
      name: VDD
      direction: passive
      rail: vdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: Y2
      name: VDDH
      direction: power_in
      rail: vddh
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: AD2
      name: VBUS
      direction: power_in
      rail: vbus
      decoupling:
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: B7
      name: VSS
      direction: power_in
      net: GND

    - number: EP
      name: VSS
      direction: passive
      net: GND

    - number: F23
      name: VSS_PA
      direction: power_in
      net: GND

    - number: B3
      name: DCC
      direction: power_out
      net: DCC
      remark: "Output of internal DC-DC regulator. In DC-DC mode: place a 10 µH inductor between DEC1 and VDD input. In LDO mode: connect DCC/DCCH to VDD; no inductor needed."

    - number: AB2
      name: DCCH
      direction: power_out
      net: DCCH

    - number: C1
      name: DEC1
      direction: passive
      net: DEC1
      remark: "Internal LDO/regulator output node; bypass capacitor must be placed as close as possible to the ball."
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 100, unit: nF }
          to: GND
          placement: close

    - number: A18
      name: DEC2
      direction: passive
      net: DEC2
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 100, unit: nF }
          to: GND
          placement: close

    - number: D23
      name: DEC3
      direction: passive
      net: DEC3
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 100, unit: nF }
          to: GND
          placement: close

    - number: B5
      name: DEC4
      direction: passive
      net: DEC4
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 100, unit: nF }
          to: GND
          placement: close

    - number: N24
      name: DEC5
      direction: passive
      net: DEC5
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 100, unit: nF }
          to: GND
          placement: close

    - number: E24
      name: DEC6
      direction: passive
      net: DEC6
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 100, unit: nF }
          to: GND
          placement: close

    - number: AC5
      name: DECUSB
      direction: passive
      net: DECUSB
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 4700, unit: nF }
          to: GND
          placement: close
        - type: capacitor
          required: true
          capacitance: { value: 100, unit: nF }
          to: GND
          placement: close

    - number: D2
      name: XL1
      direction: passive
      net: XL1
      remark: "32 MHz crystal: place between XL1 and XL2 with 12 pF load capacitors to GND on each pin."
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 12, unit: pF }
          to: GND

    - number: F2
      name: XL2
      direction: passive
      net: XL2
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 12, unit: pF }
          to: GND

    - number: B24
      name: XC1
      direction: input
      net: XC1
      remark: "32.768 kHz crystal: place between XC1 and XC2 with 12 pF load capacitors to GND on each pin."
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 12, unit: pF }
          to: GND

    - number: A23
      name: XC2
      direction: input
      net: XC2
      externals:
        - type: capacitor
          required: true
          capacitance: { value: 12, unit: pF }
          to: GND

    - number: AC24
      name: SWDIO
      direction: bidirectional
      primary_function:
        type: swd_io
      externals:
        - type: resistor
          required: true
          resistance: { value: 10, unit: kΩ }
          to: VDD

    - number: AA24
      name: SWDCLK
      direction: input
      primary_function:
        type: swd_clk
      externals:
        - type: resistor
          required: true
          resistance: { value: 10, unit: kΩ }
          to: GND

    - number: AD6
      name: D+
      direction: bidirectional
      primary_function:
        type: usb_dp

    - number: AD4
      name: D-
      direction: bidirectional
      primary_function:
        type: usb_dm

    - number: L24
      name: NFC1
      direction: bidirectional
      primary_function:
        type: nfc_antenna

    - number: J24
      name: NFC2
      direction: bidirectional
      primary_function:
        type: nfc_antenna

    - number: H23
      name: ANT
      direction: passive
      net: ANT
      remark: "Requires external matching network."

    - number: AC13
      name: RESET
      direction: bidirectional
      must_connect: true
      primary_function:
        type: reset
        polarity: active_low
      externals:
        - type: resistor
          required: true
          resistance: { value: 10, unit: kΩ }
          to: VDD
        - type: capacitor
          required: true
          capacitance: { value: 100, unit: nF }
          to: GND

    - number: L1
      name: P0.06
      direction: bidirectional
      remark: "All GPIO pins support digital I/O, configurable pull-up/pull-down, drive strength 0.5–15 mA, and flexible peripheral assignment (SPI, I2C, UART, PWM, PDM, I2S, QDEC, etc.) via the Programmable Peripheral Interconnect (PPI). Max GPIO frequency: 30 MHz."

    - number: M2
      name: P0.07
      direction: bidirectional
      remark: "alt: TRACECLK"

    - number: N1
      name: P0.08
      direction: bidirectional

    - number: T2
      name: P0.11
      direction: bidirectional
      remark: "alt: TRACEDATA2"

    - number: U1
      name: P0.12
      direction: bidirectional
      remark: "alt: TRACEDATA1"

    - number: AD8
      name: P0.13
      direction: bidirectional

    - number: AC9
      name: P0.14
      direction: bidirectional

    - number: AD10
      name: P0.15
      direction: bidirectional

    - number: AC11
      name: P0.16
      direction: bidirectional

    - number: AD12
      name: P0.17
      direction: bidirectional

    - number: AC15
      name: P0.19
      direction: bidirectional

    - number: AD16
      name: P0.20
      direction: bidirectional

    - number: AC17
      name: P0.21
      direction: bidirectional

    - number: AD18
      name: P0.22
      direction: bidirectional

    - number: AC19
      name: P0.23
      direction: bidirectional

    - number: AD20
      name: P0.24
      direction: bidirectional

    - number: AC21
      name: P0.25
      direction: bidirectional

    - number: G1
      name: P0.26
      direction: bidirectional

    - number: H2
      name: P0.27
      direction: bidirectional

    - number: A12
      name: AIN0
      direction: bidirectional
      primary_function:
        type: adc

    - number: B13
      name: AIN1
      direction: bidirectional
      primary_function:
        type: adc

    - number: J1
      name: AIN2
      direction: bidirectional
      primary_function:
        type: adc

    - number: K2
      name: AIN3
      direction: bidirectional
      primary_function:
        type: adc

    - number: B11
      name: AIN4
      direction: bidirectional
      primary_function:
        type: adc

    - number: A10
      name: AIN5
      direction: bidirectional
      primary_function:
        type: adc

    - number: B9
      name: AIN6
      direction: bidirectional
      primary_function:
        type: adc

    - number: A8
      name: AIN7
      direction: bidirectional
      primary_function:
        type: adc

    - number: AD22
      name: P1.00
      direction: bidirectional
      remark: "alt: TRACEDATA0"

    - number: Y23
      name: P1.01
      direction: bidirectional

    - number: W24
      name: P1.02
      direction: bidirectional

    - number: V23
      name: P1.03
      direction: bidirectional

    - number: U24
      name: P1.04
      direction: bidirectional

    - number: T23
      name: P1.05
      direction: bidirectional

    - number: R24
      name: P1.06
      direction: bidirectional

    - number: P23
      name: P1.07
      direction: bidirectional

    - number: P2
      name: P1.08
      direction: bidirectional

    - number: R1
      name: P1.09
      direction: bidirectional
      remark: "alt: TRACEDATA3"

    - number: A20
      name: P1.10
      direction: bidirectional

    - number: B19
      name: P1.11
      direction: bidirectional

    - number: B17
      name: P1.12
      direction: bidirectional

    - number: A16
      name: P1.13
      direction: bidirectional

    - number: B15
      name: P1.14
      direction: bidirectional

    - number: A14
      name: P1.15
      direction: bidirectional

  interfaces:
    - type: SWD
      pins:
        io: SWDIO
        clk: SWDCLK

    - type: USB
      speed_max: { value: 12, unit: Mbps }
      pins:
        dp: D+
        dm: D-

    - type: I2C
      instance: 1
      speed_max: { value: 400, unit: kHz }
      pins: {}

    - type: I2C
      instance: 2
      speed_max: { value: 400, unit: kHz }
      pins: {}

    - type: SPI
      instance: 1
      speed_max: { value: 32, unit: MHz }
      pins: {}

    - type: UART
      instance: 1
      speed_max: { value: 1, unit: Mbps }
      pins: {}
