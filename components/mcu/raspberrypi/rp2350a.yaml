$schema: "https://mageoch.github.io/silicai/schema/component.schema.json"
$schema_version: "0.1.0"

component:
  mpn: RP2350A
  manufacturer: Raspberry Pi Ltd
  category: mcu
  package: QFN-60
  datasheet: "https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf"
  kicad_symbol: "MCU_RaspberryPi:RP2350A"
  description: >
    Raspberry Pi RP2350A microcontroller in QFN-60 (7×7 mm) package.
    Dual-core Arm Cortex-M33 / RISC-V Hazard3 at up to 150 MHz, 520 kB SRAM,
    30 user GPIOs, 4 ADC inputs (GPIO26–29), USB 1.1 full-speed PHY,
    QSPI interface for external flash, 2× SPI, 2× I2C, 2× UART, 24× PWM,
    3× PIO, on-chip voltage regulator (VREG) producing 1.1 V DVDD.

  absolute_maximum_ratings:
    - parameter: dvdd_voltage
      pins: [DVDD]
      unit: V
      min: -0.5
      max: 1.21
    - parameter: iovdd_voltage
      pins: [IOVDD, QSPI_IOVDD]
      unit: V
      min: -0.5
      max: 3.63
    - parameter: gpio_voltage_standard
      pins: []
      unit: V
      min: -0.5
      max: 3.63
      remark: "IOVDD + 0.5 V; standard IO pins"
    - parameter: gpio_voltage_ft
      pins: []
      unit: V
      min: -0.5
      max: 5.5
      remark: "Fault-tolerant IO at IOVDD=3.3V; see Table 1433"
    - parameter: junction_temperature
      pins: []
      unit: "°C"
      min: -40
      max: 125
    - parameter: storage_temperature
      pins: []
      unit: "°C"
      max: 150

  recommended_operating_conditions:
    - parameter: iovdd_voltage
      pins: [IOVDD]
      unit: V
      min: 1.62
      nom: 3.3
      max: 3.63
    - parameter: qspi_iovdd_voltage
      pins: [QSPI_IOVDD]
      unit: V
      min: 1.62
      nom: 3.3
      max: 3.63
    - parameter: dvdd_voltage
      pins: [DVDD]
      unit: V
      min: 1.05
      nom: 1.1
      max: 1.16
    - parameter: vreg_vin_voltage
      pins: [VREG_VIN]
      unit: V
      min: 2.7
      nom: 3.3
      max: 5.5
    - parameter: vreg_avdd_voltage
      pins: [VREG_AVDD]
      unit: V
      min: 3.135
      nom: 3.3
      max: 3.63
    - parameter: usb_otp_vdd_voltage
      pins: [USB_OTP_VDD]
      unit: V
      min: 3.135
      nom: 3.3
      max: 3.63
    - parameter: adc_avdd_voltage
      pins: [ADC_AVDD]
      unit: V
      min: 1.62
      nom: 3.3
      max: 3.63

  temperature_range:
    operating:
      min: { value: -40, unit: "°C" }
      max: { value: 85, unit: "°C" }
    storage:
      min: { value: -40, unit: "°C" }
      max: { value: 150, unit: "°C" }
    junction_max: { value: 125, unit: "°C" }
    thermal_resistance_ja: { value: 40.542, unit: "°C/W" }

  power_consumption:
    - mode: active_dual_core_150mhz
      description: "Dual Cortex-M33 cores at 150 MHz, all peripherals on"
      rail: vreg_vin
      current: { value: 100, unit: mA }
      conditions: "VREG_VIN=3.3V, typical load, room temperature"
    - mode: dormant
      description: "DORMANT state, clocks stopped, RAM retained, wakeup via GPIO or RTC"
      rail: vreg_vin
      current: { value: 0.8, unit: mA }
      conditions: "VREG_VIN=3.3V, DVDD regulator running"

  rails:
    - id: iovdd
      net: IOVDD
      description: "Digital I/O supply for GPIO bank (1.62–3.63 V, nominally 3.3 V)"
      per_pin_decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - id: qspi_iovdd
      net: QSPI_IOVDD
      description: "QSPI I/O supply (1.62–3.63 V, nominally 3.3 V)"
      per_pin_decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - id: dvdd
      net: DVDD
      description: >
        Digital core supply at 1.1 V. Normally generated by on-chip VREG from VREG_VIN.
        Two nearest DVDD pins (pins 6, 39) decouple with 100 nF; pin 23 decouples with 4.7 µF.
      per_pin_decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - id: usb_otp_vdd
      net: USB_OTP_VDD
      description: "USB PHY and OTP supply (nominally 3.3 V). Must always be powered."
      per_pin_decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - id: adc_avdd
      net: ADC_AVDD
      description: "ADC analogue supply (nominally 3.3 V for best performance)"
      per_pin_decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - id: vreg_vin
      net: VREG_VIN
      description: "On-chip voltage regulator input (2.7–5.5 V, nominally 3.3 V)"
      per_pin_decoupling:
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - id: vreg_avdd
      net: VREG_AVDD
      description: >
        Voltage regulator analogue supply (nominally 3.3 V). Noise sensitive; use RC filter:
        33 Ω in series with 4.7 µF from the 3.3 V rail to VREG_AVDD.

  pins:
    - number: 1
      name: IOVDD
      direction: power_in
      rail: iovdd

    - number: 11
      name: IOVDD
      direction: passive
      rail: iovdd

    - number: 20
      name: IOVDD
      direction: passive
      rail: iovdd

    - number: 30
      name: IOVDD
      direction: passive
      rail: iovdd

    - number: 38
      name: IOVDD
      direction: passive
      rail: iovdd

    - number: 45
      name: IOVDD
      direction: passive
      rail: iovdd

    - number: 6
      name: DVDD
      direction: passive
      rail: dvdd

    - number: 23
      name: DVDD
      direction: passive
      rail: dvdd
      required_external:
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          to: GND
          placement: close
          scope: component
          remark: "Far DVDD pin; use 4.7 µF as recommended by Raspberry Pi design guide"

    - number: 39
      name: DVDD
      direction: passive
      rail: dvdd

    - number: 54
      name: QSPI_IOVDD
      direction: power_in
      rail: qspi_iovdd

    - number: 53
      name: USB_OTP_VDD
      direction: power_in
      rail: usb_otp_vdd

    - number: 44
      name: ADC_AVDD
      direction: power_in
      rail: adc_avdd

    - number: 49
      name: VREG_VIN
      direction: power_in
      rail: vreg_vin

    - number: 46
      name: VREG_AVDD
      direction: power_in
      rail: vreg_avdd
      required_external:
        - type: resistor
          resistance: { value: 33, unit: Ω }
          to: VREG_VIN
          placement: close
          scope: component
          remark: "Series resistor of RC low-pass filter for VREG_AVDD noise isolation"
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          to: GND
          placement: close
          scope: component
          remark: "Shunt capacitor of RC low-pass filter on VREG_AVDD"

    - number: 47
      name: VREG_PGND
      direction: power_in
      net: GND

    - number: 48
      name: VREG_LX
      direction: passive
      net: VREG_LX
      required_external:
        - type: inductor
          inductance: { value: 3300, unit: nH }
          to: DVDD
          placement: close
          scope: component
          remark: "3.3 µH shielded inductor between VREG_LX and DVDD output (Cin 4.7 µF to GND, Cout 4.7 µF to GND)"

    - number: 50
      name: VREG_FB
      direction: input
      net: VREG_FB
      required_external:
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          to: DVDD
          placement: close
          scope: component
          remark: "Connect between VREG_VIN and VREG_PGND (Cout). VREG_FB fed from DVDD node."

    - number: EP
      name: GND
      direction: power_in
      net: GND

    - number: 21
      name: XIN
      direction: input
      net: XIN
      primary_function:
        type: clock_in
      required_external:
        - type: crystal
          to: XOUT
          placement: close
          scope: component
          remark: "12 MHz crystal between XIN and XOUT; load capacitors per crystal spec (typically 12–18 pF to GND)"

    - number: 22
      name: XOUT
      direction: passive
      net: XOUT

    - number: 52
      name: USB_DP
      direction: bidirectional
      primary_function:
        type: usb_dp
      required_external:
        - type: resistor
          resistance: { value: 27, unit: Ω }
          to: USB_D+
          placement: close
          scope: component
          remark: "27 Ω series resistor required between USB_DP pin and the USB connector D+ line"

    - number: 51
      name: USB_DM
      direction: bidirectional
      primary_function:
        type: usb_dm
      required_external:
        - type: resistor
          resistance: { value: 27, unit: Ω }
          to: USB_D-
          placement: close
          scope: component
          remark: "27 Ω series resistor required between USB_DM pin and the USB connector D- line"

    - number: 24
      name: SWCLK
      direction: input
      primary_function:
        type: swd_clk
      required_external:
        - type: resistor
          resistance: { value: 10, unit: kΩ }
          to: GND
          scope: component
          remark: "Pull-down recommended on SWCLK to avoid false triggering"

    - number: 25
      name: SWDIO
      direction: bidirectional
      primary_function:
        type: swd_io
      required_external:
        - type: resistor
          resistance: { value: 10, unit: kΩ }
          to: IOVDD
          scope: component
          remark: "Pull-up recommended on SWDIO; pin has internal pull-up at reset"

    - number: 26
      name: RUN
      direction: input
      must_connect: true
      primary_function:
        type: reset
        polarity: active_low
      required_external:
        - type: resistor
          resistance: { value: 10, unit: kΩ }
          to: IOVDD
          scope: component
          remark: "Pull RUN high (to IOVDD) via 10 kΩ for normal operation; drive low to hold chip in reset"

    - number: 57
      name: QSPI_SD0
      direction: bidirectional
      primary_function:
        type: spi_mosi
      net: QSPI_SD0

    - number: 58
      name: QSPI_SD1
      direction: bidirectional
      net: QSPI_SD1

    - number: 59
      name: QSPI_SD2
      direction: bidirectional
      net: QSPI_SD2

    - number: 55
      name: QSPI_SD3
      direction: bidirectional
      net: QSPI_SD3

    - number: 56
      name: QSPI_SCLK
      direction: output
      primary_function:
        type: spi_sck
      net: QSPI_SCLK

    - number: 60
      name: QSPI_SS
      direction: output
      primary_function:
        type: spi_cs
      net: QSPI_SS
      required_external:
        - type: resistor
          resistance: { value: 10, unit: kΩ }
          to: QSPI_IOVDD
          scope: component
          remark: "QSPI_SS has internal pull-up; also serves as BOOTSEL — hold low at reset to enter USB boot mode"

    - number: 2
      name: GPIO0
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 3
      name: GPIO1
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 4
      name: GPIO2
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 5
      name: GPIO3
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 7
      name: GPIO4
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 8
      name: GPIO5
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 9
      name: GPIO6
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 10
      name: GPIO7
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 12
      name: GPIO8
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 13
      name: GPIO9
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 14
      name: GPIO10
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 15
      name: GPIO11
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 16
      name: GPIO12
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 17
      name: GPIO13
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 18
      name: GPIO14
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 19
      name: GPIO15
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 27
      name: GPIO16
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 28
      name: GPIO17
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 29
      name: GPIO18
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 31
      name: GPIO19
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 32
      name: GPIO20
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 33
      name: GPIO21
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 34
      name: GPIO22
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 35
      name: GPIO23
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 36
      name: GPIO24
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 37
      name: GPIO25
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 40
      name: GPIO26_ADC0
      direction: bidirectional
      primary_function:
        type: adc
      remark: "Dual-function GPIO or ADC input (channel 0). Disable digital functions (IE=0, OD=1) when used as ADC. ADC input voltage must not exceed IOVDD."

    - number: 41
      name: GPIO27_ADC1
      direction: bidirectional
      primary_function:
        type: adc

    - number: 42
      name: GPIO28_ADC2
      direction: bidirectional
      primary_function:
        type: adc

    - number: 43
      name: GPIO29_ADC3
      direction: bidirectional
      primary_function:
        type: adc

  interfaces:
    - type: SWD
      pins:
        io: SWDIO
        clk: SWCLK

    - type: USB
      speed_max: { value: 12, unit: Mbps }
      pins:
        dp: USB_DP
        dm: USB_DM

    - type: SPI
      instance: 2
      description: "Dedicated QSPI interface for external NOR flash or PSRAM (4-bit data bus)"
      pins:
        clk: QSPI_SCLK
        cs: QSPI_SS
        mosi: QSPI_SD0
        miso: QSPI_SD1

    - type: SPI
      instance: 0
      speed_max: { value: 62.5, unit: MHz }
      pins: {}

    - type: SPI
      instance: 1
      speed_max: { value: 62.5, unit: MHz }
      pins: {}

    - type: I2C
      instance: 0
      speed_max: { value: 1, unit: MHz }
      pins: {}

    - type: I2C
      instance: 1
      speed_max: { value: 1, unit: MHz }
      pins: {}

    - type: UART
      instance: 0
      speed_max: { value: 7.8, unit: Mbps }
      pins: {}

    - type: UART
      instance: 1
      speed_max: { value: 7.8, unit: Mbps }
      pins: {}
