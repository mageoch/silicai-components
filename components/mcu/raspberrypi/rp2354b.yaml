  interfaces:
    - type: SWD
      pins:
        io: SWDIO
        clk: SWCLK

    - type: USB
      speed_max: { value: 12, unit: Mbps }
      pins:
        dp: USB_DP
        dm: USB_DM
      routing:
        differential_impedance: { value: 90, unit: Ω }
        length_mismatch_max: { value: 2.54, unit: mm }

    - type: SPI
      instance: 2
      description: "Dedicated QSPI interface for external NOR flash or PSRAM (4-bit data bus)"
      pins:
        clk: QSPI_SCLK
        cs: QSPI_SS
        mosi: QSPI_SD0
        miso: QSPI_SD1

    - type: SPI
      instance: 0
      speed_max: { value: 62.5, unit: MHz }
      pins: {}

    - type: SPI
      instance: 1
      speed_max: { value: 62.5, unit: MHz }
      pins: {}

    - type: I2C
      instance: 0
      speed_max: { value: 1, unit: MHz }
      pins: {}

    - type: I2C
      instance: 1
      speed_max: { value: 1, unit: MHz }
      pins: {}

    - type: UART
      instance: 0
      speed_max: { value: 7.8, unit: Mbps }
      pins: {}

    - type: UART
