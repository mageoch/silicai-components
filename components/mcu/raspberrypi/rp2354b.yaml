$schema: "https://mageoch.github.io/silicai/schema/component.schema.json"
$schema_version: "0.1.0"

component:
  mpn: RP2354B
  manufacturer: Raspberry Pi Ltd
  category: mcu
  package: QFN-80
  datasheet: "https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf"
  lcsc: "C39843328"
  kicad_symbol: "MCU_RaspberryPi:RP2354B"
  description: >
    Raspberry Pi RP2354B microcontroller in QFN-80 (10×10 mm) package with embedded 2 MB PSRAM.
    Dual-core Arm Cortex-M33 / RISC-V Hazard3 at up to 150 MHz, 520 kB SRAM,
    48 user GPIOs, 8 ADC inputs (GPIO40–47), USB 1.1 full-speed PHY,
    QSPI interface for external flash, 2× SPI, 2× I2C, 2× UART, 24× PWM,
    3× PIO, on-chip voltage regulator (VREG) producing 1.1 V DVDD.

  absolute_maximum_ratings:
    - parameter: dvdd_voltage
      pins: [DVDD]
      unit: V
      min: -0.5
      max: 1.21
    - parameter: iovdd_voltage
      pins: [IOVDD, QSPI_IOVDD]
      unit: V
      min: -0.5
      max: 3.63
    - parameter: gpio_voltage_standard
      pins: []
      unit: V
      min: -0.5
      max: 3.63
      remark: "IOVDD + 0.5 V; standard IO pins"
    - parameter: gpio_voltage_ft
      pins: []
      unit: V
      min: -0.5
      max: 5.5
      remark: "Fault-tolerant IO at IOVDD=3.3V; see Table 1433"
    - parameter: junction_temperature
      pins: []
      unit: "°C"
      min: -40
      max: 125
    - parameter: storage_temperature
      pins: []
      unit: "°C"
      max: 150

  recommended_operating_conditions:
    - parameter: iovdd_voltage
      pins: [IOVDD]
      unit: V
      min: 1.62
      nom: 3.3
      max: 3.63
    - parameter: qspi_iovdd_voltage
      pins: [QSPI_IOVDD]
      unit: V
      min: 1.62
      nom: 3.3
      max: 3.63
    - parameter: dvdd_voltage
      pins: [DVDD]
      unit: V
      min: 1.05
      nom: 1.1
      max: 1.16
    - parameter: vreg_vin_voltage
      pins: [VREG_VIN]
      unit: V
      min: 2.7
      nom: 3.3
      max: 5.5
    - parameter: vreg_avdd_voltage
      pins: [VREG_AVDD]
      unit: V
      min: 3.135
      nom: 3.3
      max: 3.63
    - parameter: usb_otp_vdd_voltage
      pins: [USB_OTP_VDD]
      unit: V
      min: 3.135
      nom: 3.3
      max: 3.63
    - parameter: adc_avdd_voltage
      pins: [ADC_AVDD]
      unit: V
      min: 1.62
      nom: 3.3
      max: 3.63

  temperature_range:
    operating:
      min: { value: -40, unit: "°C" }
      max: { value: 85, unit: "°C" }
    storage:
      min: { value: -40, unit: "°C" }
      max: { value: 150, unit: "°C" }
    junction_max: { value: 125, unit: "°C" }
    thermal_resistance_ja: { value: 32.0, unit: "°C/W" }

  power_consumption:
    - mode: active_dual_core_150mhz
      description: "Dual Cortex-M33 cores at 150 MHz, all peripherals on"
      rail: vreg_vin
      current: { value: 100, unit: mA }
      conditions: "VREG_VIN=3.3V, typical load, room temperature"
    - mode: dormant
      description: "DORMANT state, clocks stopped, RAM retained, wakeup via GPIO or RTC"
      rail: vreg_vin
      current: { value: 0.8, unit: mA }
      conditions: "VREG_VIN=3.3V, DVDD regulator running"

  rails:
    - id: iovdd
      net: IOVDD
      description: "Digital I/O supply for GPIO bank (1.62–3.63 V, nominally 3.3 V)"

    - id: qspi_iovdd
      net: QSPI_IOVDD
      description: "QSPI I/O supply (1.62–3.63 V, nominally 3.3 V)"

    - id: dvdd
      net: +1V1
      type: internal_node
      description: "Digital core supply at 1.1 V, generated by on-chip buck regulator from VREG_VIN via VREG_LX."
      input_filter:
        - type: inductor
          inductance: { value: 3300, unit: nH }
          from: VREG_LX
          to: +1V1
          recommended_mpn: AOTA-B201610S3R3-101-T
          package: "0806"
          placement: close
          orientation: "dot (winding-start) towards DVDD / VREG_FB side"
          scope: component
          remark: "Abracon part ships on tape with consistent orientation; wrong-way-round part's field interferes with the output capacitor and upsets the regulator."
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          from: +1V1
          to: GND
          placement: close

    - id: usb_otp_vdd
      net: USB_OTP_VDD
      description: "USB PHY and OTP supply (nominally 3.3 V). Must always be powered."

    - id: adc_avdd
      net: ADC_AVDD
      description: "ADC analogue supply (nominally 3.3 V for best performance)"

    - id: vreg_vin
      net: VREG_VIN
      description: "On-chip voltage regulator input (2.7–5.5 V, nominally 3.3 V)"
      bulk_decoupling:
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - id: vreg_avdd
      net: VREG_AVDD
      description: "Voltage regulator analogue supply (nominally 3.3 V). Noise sensitive; RC-filtered from VREG_VIN."
      input_filter:
        - type: resistor
          resistance: { value: 33, unit: Ω }
          from: VREG_VIN
          to: VREG_AVDD
          placement: close
          scope: component
          remark: "Series element of RC low-pass filter between +3V3 and VREG_AVDD"
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          from: VREG_AVDD
          to: GND
          placement: close
          remark: "Shunt element of RC low-pass filter; VREG_AVDD to GND"

  pins:
    # — IOVDD (8 pins) —
    - number: 5
      name: IOVDD
      direction: power_in
      rail: iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 15
      name: IOVDD
      direction: passive
      rail: iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 24
      name: IOVDD
      direction: passive
      rail: iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 29
      name: IOVDD
      direction: passive
      rail: iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 41
      name: IOVDD
      direction: passive
      rail: iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 50
      name: IOVDD
      direction: passive
      rail: iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 60
      name: IOVDD
      direction: passive
      rail: iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 76
      name: IOVDD
      direction: passive
      rail: iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    # — DVDD (3 pins) —
    - number: 10
      name: DVDD
      direction: passive
      rail: dvdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 32
      name: DVDD
      direction: passive
      rail: dvdd
      decoupling:
        - type: capacitor
          capacitance: { value: 4700, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close
          remark: "Far DVDD pin; use 4.7 µF as recommended by Raspberry Pi design guide"

    - number: 51
      name: DVDD
      direction: passive
      rail: dvdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    # — Power supply pins —
    - number: 69
      name: QSPI_IOVDD
      direction: power_in
      rail: qspi_iovdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 68
      name: USB_OTP_VDD
      direction: power_in
      rail: usb_otp_vdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 59
      name: ADC_AVDD
      direction: power_in
      rail: adc_avdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 64
      name: VREG_VIN
      direction: power_in
      rail: vreg_vin

    - number: 61
      name: VREG_AVDD
      direction: power_in
      rail: vreg_avdd

    - number: 62
      name: VREG_PGND
      direction: power_in
      net: GND

    - number: 63
      name: VREG_LX
      direction: passive
      net: VREG_LX

    - number: 65
      name: VREG_FB
      direction: input
      rail: dvdd

    - number: 81
      name: GND
      direction: power_in
      net: GND

    # — Clock —
    - number: 30
      name: XIN
      direction: input
      net: XIN
      primary_function:
        type: clock_in
      externals:
        - type: crystal
          required: true
          frequency: { value: 12, unit: MHz }
          frequency_tolerance: { value: 30, unit: ppm }
          load_capacitance: { value: 10, unit: pF }
          esr: { value: 50, unit: Ω }
          recommended_mpn: ABM8-272-T3
          to: XOUT
          series_r: { value: 1, unit: kΩ }
          xin_cap: { value: 15, unit: pF }
          xout_cap: { value: 15, unit: pF }
          placement: close
          scope: component
          condition: "series_r applies at IOVDD=3.3V; re-tune for other voltages"
          remark: "12 MHz crystal between XIN and XOUT. Rs (1kΩ) in series on XOUT limits crystal drive current. C_xin on XIN side, C_xout on crystal XOUT side (between crystal and Rs). Keep layout short to minimise parasitic capacitance (~3pF assumed from PCB traces)."

    - number: 31
      name: XOUT
      direction: passive
      net: XOUT

    # — Debug / control —
    - number: 33
      name: SWCLK
      direction: input
      primary_function:
        type: swd_clk
      externals:
        - type: resistor
          required: true
          resistance: { value: 10, unit: kΩ }
          to: GND
          scope: component
          remark: "Pull-down recommended on SWCLK to avoid false triggering"

    - number: 34
      name: SWDIO
      direction: bidirectional
      primary_function:
        type: swd_io
      externals:
        - type: resistor
          required: true
          resistance: { value: 10, unit: kΩ }
          to: IOVDD
          scope: component
          remark: "Pull-up recommended on SWDIO; pin has internal pull-up at reset"

    - number: 35
      name: RUN
      direction: input
      must_connect: true
      primary_function:
        type: reset
        polarity: active_low
      externals:
        - type: resistor
          required: true
          resistance: { value: 10, unit: kΩ }
          to: IOVDD
          scope: component
          remark: "Pull RUN high (to IOVDD) via 10 kΩ for normal operation; drive low to hold chip in reset"
        - type: resistor
          resistance: { value: 1, unit: kΩ }
          from: RUN
          to: RUN_BTN
          placement: close
          remark: "Current-limiting series resistor for reset button"
        - type: switch
          from: RUN_BTN
          to: GND
          remark: "Momentary SPST; pull RUN low to reset the chip"

    # — USB —
    - number: 66
      name: USB_DM
      direction: bidirectional
      primary_function:
        type: usb_dm
      externals:
        - type: resistor
          required: true
          resistance: { value: 27, unit: Ω }
          to: USB_D-
          placement: close
          scope: component
          remark: "27 Ω series resistor required between USB_DM pin and the USB connector D- line"

    - number: 67
      name: USB_DP
      direction: bidirectional
      primary_function:
        type: usb_dp
      externals:
        - type: resistor
          required: true
          resistance: { value: 27, unit: Ω }
          to: USB_D+
          placement: close
          scope: component
          remark: "27 Ω series resistor required between USB_DP pin and the USB connector D+ line"

    # — QSPI flash interface —
    - number: 72
      name: QSPI_SD0
      direction: bidirectional
      primary_function:
        type: spi_mosi
      net: QSPI_SD0

    - number: 74
      name: QSPI_SD1
      direction: bidirectional
      net: QSPI_SD1

    - number: 73
      name: QSPI_SD2
      direction: bidirectional
      net: QSPI_SD2

    - number: 70
      name: QSPI_SD3
      direction: bidirectional
      net: QSPI_SD3

    - number: 71
      name: QSPI_SCLK
      direction: output
      primary_function:
        type: spi_sck
      net: QSPI_SCLK

    - number: 75
      name: QSPI_SS
      direction: output
      primary_function:
        type: spi_cs
      net: QSPI_SS
      externals:
        - type: resistor
          required: true
          resistance: { value: 10, unit: kΩ }
          to: QSPI_IOVDD
          scope: component
          remark: "QSPI_SS has internal pull-up; also serves as BOOTSEL — hold low at reset to enter USB boot mode"
        - type: resistor
          resistance: { value: 1, unit: kΩ }
          from: QSPI_SS
          to: BOOTSEL_BTN
          placement: close
          remark: "Current-limiting series resistor for BOOTSEL button"
        - type: switch
          from: BOOTSEL_BTN
          to: GND
          remark: "Momentary SPST; pull BOOTSEL low at reset to enter USB boot mode"

    # — GPIO0–GPIO3 (bottom-left corner) —
    - number: 77
      name: GPIO0
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 78
      name: GPIO1
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 79
      name: GPIO2
      direction: bidirectional
      primary_function:
        type: gpio

    - number: 80
