$schema: "https://mageoch.github.io/silicai/schema/component.schema.json"
$schema_version: "0.1.0"

component:
  mpn: TMP117AIDRVR
  manufacturer: Texas Instruments
  category: sensor
  package: WSON-6
  datasheet: "https://www.ti.com/lit/ds/symlink/tmp117.pdf"
  kicad_symbol: "Sensor_Temperature:TMP117xxYBG"

  temperature_range:
    operating:
      min: { value: -40, unit: °C }
      max: { value: 125, unit: °C }
    storage:
      min: { value: -55, unit: °C }
      max: { value: 150, unit: °C }
    junction_max:          { value: 125, unit: °C }
    thermal_resistance_ja: { value: 88.6, unit: °C/W }

  power_consumption:
    - mode: active_conversion
      description: "Continuous temperature conversion at 1 Hz"
      rail: vplus
      current: { value: 135, unit: µA }
      conditions: "V+=3.3V, 1 Hz conversion rate"
    - mode: shutdown
      description: "Conversion disabled via register"
      rail: vplus
      current: { value: 0.25, unit: µA }
      current_max: { value: 1, unit: µA }
      conditions: "V+=3.3V, shutdown mode"

  timing:
    - name: t_su_dat
      description: "SDA setup time before SCL rising edge"
      interface: I2C
      from_pin: SDA
      to_pin: SCL
      from_edge: any
      to_edge: rising
      min: { value: 250, unit: ns }
      conditions: "Fast mode (400 kHz)"
    - name: t_hd_dat
      description: "SDA hold time after SCL falling edge"
      interface: I2C
      from_pin: SCL
      to_pin: SDA
      from_edge: falling
      to_edge: any
      min: { value: 0, unit: ns }
      conditions: "Fast mode (400 kHz)"
    - name: t_conv
      description: "Temperature conversion time (one-shot or continuous)"
      min: { value: 15.5, unit: ms }
      typ: { value: 15.5, unit: ms }
      conditions: "8 averages (default)"

  absolute_maximum_ratings:
    - parameter: supply_voltage
      pins: ["V+"]
      unit: V
      max: 6
    - parameter: io_voltage
      pins: [SCL, SDA, ALERT, ADD0]
      unit: V
      max: 6

  recommended_operating_conditions:
    - parameter: supply_voltage
      pins: ["V+"]
      unit: V
      min: 1.7
      nom: 3.3
      max: 5.5

  rails:
    - id: vplus
      net: VCC_3V3

  pins:
    - number: 1
      name: SCL
      direction: input
      open_drain: true
      primary_function:
        type: i2c_scl
      electrical:
        v_ih_min: { multiplier: 0.7, reference: "V+" }
        v_il_max: { multiplier: 0.3, reference: "V+" }
    - number: 2
      name: GND
      direction: power_in
      net: GND

    - number: 3
      name: ALERT
      direction: output
      open_drain: true
      primary_function:
        type: alert
        polarity: active_low
      electrical:
        v_ol_max: { value: 0.4, unit: V }
        i_ol_max: { value: 3, unit: mA }
      required_external:
        - type: resistor
          resistance: { value: 10, unit: kΩ }
          from: ALERT
          to: VCC_3V3
          scope: component

    - number: 4
      name: ADD0
      direction: input
      must_connect: true
      primary_function:
        type: address_select
        options:
          - connect_to: GND
            i2c_address: "0x48"
          - connect_to: "V+"
            i2c_address: "0x49"
          - connect_to: SDA
            i2c_address: "0x4A"
          - connect_to: SCL
            i2c_address: "0x4B"
      required_external:
        - type: resistor
          resistance: { value: 10, unit: kΩ }
          from: ADD0
          to: GND
          scope: component

    - number: 5
      name: "V+"
      direction: power_in
      rail: vplus
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

    - number: 6
      name: SDA
      direction: bidirectional
      open_drain: true
      primary_function:
        type: i2c_sda
      electrical:
        v_ih_min: { multiplier: 0.7, reference: "V+" }
        v_il_max: { multiplier: 0.3, reference: "V+" }
        v_ol_max: { value: 0.4, unit: V }
        i_ol_max: { value: 3, unit: mA }
  interfaces:
    - type: I2C
      instance: 1
      speed_min: { value: 1, unit: kHz }
      speed_max: { value: 400, unit: kHz }
      pins:
        scl: SCL
        sda: SDA
