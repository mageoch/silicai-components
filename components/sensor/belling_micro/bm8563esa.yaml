$schema: "https://mageoch.github.io/silicai/schema/component.schema.json"
$schema_version: "0.1.0"

component:
  mpn: BM8563ESA
  manufacturer: Belling Micro
  category: sensor
  package: SOP-8
  datasheet: "https://www.belling.com.cn/media/file_object/bel_product/BM8563/datasheet/BM8563_V1.1_EN.pdf"
  kicad_symbol: "RTC:BM8563"

  description: "CMOS I2C Real-Time Clock/Calendar with programmable clock output, alarm, timer and voltage-low detector"

  temperature_range:
    operating:
      min: { value: -40, unit: °C }
      max: { value: 85, unit: °C }
    storage:
      min: { value: -55, unit: °C }
      max: { value: 150, unit: °C }

  power_consumption:
    - mode: timekeeping
      description: "Interface inactive, CLKOUT disabled, VDD=3.0V"
      rail: vdd
      current: { value: 250, unit: nA }
      current_max: { value: 650, unit: nA }
      conditions: "VDD=3.0V, fSCL=0 Hz, TA=25°C, CLKOUT disabled"
    - mode: timekeeping_clkout
      description: "Interface inactive, CLKOUT enabled at 32.768 kHz, VDD=3.0V"
      rail: vdd
      current: { value: 650, unit: nA }
      current_max: { value: 1000, unit: nA }
      conditions: "VDD=3.0V, fSCL=0 Hz, TA=25°C, CLKOUT=32.768kHz"
    - mode: interface_active
      description: "I2C interface active at 400 kHz"
      rail: vdd
      current: { value: 800, unit: µA }
      conditions: "fSCL=400 kHz"

  absolute_maximum_ratings:
    - parameter: supply_voltage
      pins: ["VDD"]
      unit: V
      min: -0.5
      max: 6.5
    - parameter: io_voltage_scl_sda
      pins: [SCL, SDA]
      unit: V
      min: -0.5
      max: 6.5
    - parameter: io_voltage_osci
      pins: [OSCI]
      unit: V
      min: -0.5
      max: 6.0
    - parameter: output_voltage
      pins: [CLKOUT, "/INT"]
      unit: V
      min: -0.5
      max: 6.5
    - parameter: input_current
      pins: []
      unit: mA
      min: -10
      max: 10
    - parameter: output_current
      pins: []
      unit: mA
      min: -10
      max: 10
    - parameter: power_dissipation
      pins: []
      unit: mW
      max: 300
    - parameter: ambient_temperature
      pins: []
      unit: °C
      min: -40
      max: 85
    - parameter: storage_temperature
      pins: []
      unit: °C
      min: -55
      max: 150

  recommended_operating_conditions:
    - parameter: supply_voltage_i2c_inactive
      pins: ["VDD"]
      unit: V
      min: 1.2
      max: 5.5
      conditions: "I2C-bus inactive"
    - parameter: supply_voltage_i2c_active
      pins: ["VDD"]
      unit: V
      min: 1.8
      max: 5.5
      conditions: "I2C-bus active, fSCL=400 kHz"

  rails:
    - id: vdd
      net: VCC

  pins:
    - number: 1
      name: OSCI
      direction: input
      primary_function:
        type: clock_in
      description: "Crystal oscillator input. Connect to 32.768 kHz quartz crystal."

    - number: 2
      name: OSCO
      direction: output
      primary_function:
        type: clock_out
      description: "Crystal oscillator output. Connect to 32.768 kHz quartz crystal. Load capacitance 15–35 pF (typ 25 pF)."

    - number: 3
      name: "/INT"
      direction: output
      open_drain: true
      primary_function:
        type: interrupt
        polarity: active_low
      description: "Interrupt output, open-drain, active LOW. Asserted on alarm or timer event."
      electrical:
        i_ol_max: { value: 1, unit: mA }
      required_external:
        - type: resistor
          resistance: { value: 10, unit: kΩ }
          from: "/INT"
          to: VCC
          scope: component

    - number: 4
      name: VSS
      direction: power_in
      net: GND

    - number: 5
      name: SDA
      direction: bidirectional
      open_drain: true
      primary_function:
        type: i2c_sda
      description: "I2C serial data, bidirectional open-drain. Fixed slave address 0x51 (write: 0xA2, read: 0xA3)."
      electrical:
        v_ih_min: { multiplier: 0.7, reference: VDD }
        v_il_max: { multiplier: 0.3, reference: VDD }
        i_ol_max: { value: 3, unit: mA }
      required_external:
        - type: resistor
          resistance: { value: 4.7, unit: kΩ }
          from: SDA
          to: VCC
          scope: bus

    - number: 6
      name: SCL
      direction: input
      primary_function:
        type: i2c_scl
      description: "I2C serial clock input, up to 400 kHz."
      electrical:
        v_ih_min: { multiplier: 0.7, reference: VDD }
        v_il_max: { multiplier: 0.3, reference: VDD }
      required_external:
        - type: resistor
          resistance: { value: 4.7, unit: kΩ }
          from: SCL
          to: VCC
          scope: bus

    - number: 7
      name: CLKOUT
      direction: output
      open_drain: true
      primary_function:
        type: clock_out
      description: "Programmable clock output, open-drain. Selectable: 32.768 kHz, 1024 Hz, 32 Hz, 1 Hz. Enabled at power-on."
      required_external:
        - type: resistor
          resistance: { value: 10, unit: kΩ }
          from: CLKOUT
          to: VCC
          scope: component
          note: "Only needed if CLKOUT is used"

    - number: 8
      name: VDD
      direction: power_in
      rail: vdd
      decoupling:
        - type: capacitor
          capacitance: { value: 100, unit: nF }
          voltage_rating: { value: 10, unit: V }
          dielectric: [X5R, X7R]
          placement: close

  interfaces:
    - type: I2C
      instance: 1
      speed_max: { value: 400, unit: kHz }
      address: "0x51"
      pins:
        scl: SCL
        sda: SDA

  notes:
    - "I2C slave address is fixed: 7-bit address 0x51 (write byte 0xA2, read byte 0xA3)."
    - "CLKOUT is open-drain and enabled by default at power-on. Add pull-up if used."
    - "Crystal: 32.768 kHz, series resistance Rs ≤ 100 kΩ, parallel load capacitance CL = 7–12.5 pF."
    - "VL bit in seconds register indicates voltage-low event; clock data integrity may be compromised."
    - "OSCI input voltage max is VDD+0.5V; do not drive OSCI above this level."
